<script>
(function(){
  try{
    var raw=localStorage.getItem('mc_config');
    var cfg=raw?JSON.parse(raw):{};
    var choice=cfg.theme||'dark';
    var resolved=choice==='system'&&window.matchMedia? (window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark') : choice;
    resolved = resolved==='light'?'light':'dark';
    document.documentElement.setAttribute('data-theme', resolved);
    document.documentElement.setAttribute('data-theme-choice', choice);
    var meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content', resolved==='light'?'#f7f2e7':'#060a10');
  }catch(e){ document.documentElement.setAttribute('data-theme','dark'); }
})();
</script>
