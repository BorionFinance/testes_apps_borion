<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#042344">
  <title>Atualizando Marco Iris</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;font-family:Segoe UI,Arial,sans-serif;color:#eef7ff;background:radial-gradient(circle at 70% 15%,rgba(12,101,217,.38),transparent 34%),linear-gradient(145deg,#02152c,#07345f)}
    .box{width:min(520px,100%);padding:32px;border-radius:28px;background:rgba(11,39,75,.88);border:1px solid rgba(130,184,240,.2);box-shadow:0 32px 90px rgba(0,0,0,.42);backdrop-filter:blur(24px);text-align:center}.spinner{width:56px;height:56px;margin:0 auto 20px;border:4px solid rgba(255,255,255,.12);border-top-color:#ff642f;border-radius:50%;animation:girar .8s linear infinite}@keyframes girar{to{transform:rotate(360deg)}}h1{margin:0 0 10px}p{margin:0;color:#a8bfd8;line-height:1.55}.ok{color:#70dfad}
  </style>
</head>
<body>
  <main class="box"><div class="spinner"></div><h1>Atualizando o sistema</h1><p id="status">Removendo a versão antiga e preparando a interface v2.5.3…</p></main>
  <script>
    (async()=>{
      try{
        const appBase=new URL('./',location.href).href;
        if('serviceWorker' in navigator){
          const regs=await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.filter(reg=>reg.scope===appBase).map(reg=>reg.unregister()));
        }
        if('caches' in window){
          const keys=await caches.keys();
          await Promise.all(keys.filter(key=>key.startsWith('marco-iris-')).map(key=>caches.delete(key)));
        }
        if('indexedDB' in window){
          const legacy=['marco_iris_tecnologia_db_v240_clean','marco_iris_tecnologia_db','marco_iris_tecnologia'];
          await Promise.all(legacy.map(name=>new Promise(resolve=>{const request=indexedDB.deleteDatabase(name);request.onsuccess=request.onerror=request.onblocked=()=>resolve();})));
        }
        document.getElementById('status').innerHTML='<span class="ok">Atualização concluída.</span><br>Abrindo o modo 100% Google Drive…';
      }catch(e){
        document.getElementById('status').textContent='A limpeza automática terminou com uma pendência. O sistema será aberto mesmo assim.';
      }
      setTimeout(()=>location.replace('./?v=2.5.3&cache='+Date.now()),900);
    })();
  </script>
</body>
</html>
